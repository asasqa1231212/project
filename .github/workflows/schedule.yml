name: maintenance

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  # First job: Get categories from main project repository
  get-categories:
    runs-on: ubuntu-latest
    outputs:
      batches: ${{ steps.split-batches.outputs.batches }}
    steps:
      # Checkout the MAIN project repository to get categories
      - name: Checkout main project
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.MAIN_REPO }}
          token: ${{ secrets.MY_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Read categories and split into batches
        id: split-batches
        run: node -e '
          const fs = require("fs");
          const data = JSON.parse(fs.readFileSync("categories.json", "utf8"));
          const categories = data.categories;
          
          // Split into batches of 4
          const batchSize = 4;
          const batches = [];
          for (let i = 0; i < categories.length; i += batchSize) {
            batches.push(categories.slice(i, i + batchSize));
          }
          
          console.log("Categories found:", categories.length);
          console.log("Batches:", batches.length);
          
          // Output as JSON string for matrix
          console.log("::set-output name=batches::" + JSON.stringify(batches));
        '

  # Second job: Run price updates with batches (4 categories per job)
  run:
    needs: get-categories
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        batch: ${{ fromJson(needs.get-categories.outputs.batches) }}

    container:
      image: mcr.microsoft.com/playwright:v1.58.1-jammy

    steps:
      # Checkout the private repository (same as MAIN_REPO)
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.MAIN_REPO }}
          token: ${{ secrets.MY_PAT }}
          path: project

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: project/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: project
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: project
        run: pnpm exec prisma generate

      - name: Install Playwright browsers
        working-directory: project
        run: pnpm exec playwright install chromium --with-deps

      - name: Run price updates for batch
        working-directory: project
        env:
          ENABLE_SCRAPING: "true"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production
        run: |
          # Get categories from matrix batch
          CATEGORIES='${{ matrix.batch }}'
          
          # Use Node.js to iterate
          node -e "
            const categories = JSON.parse('${{ matrix.batch }}'.replace(/'/g, '\"'));
            console.log('Categories in this batch:', categories);
            categories.forEach(function(cat) {
              console.log('========================================');
              console.log('Processing category:', cat);
              console.log('========================================');
              require('child_process').execSync('CATEGORY=\"' + cat + '\" pnpm -s scrape:update-prices', {stdio: 'inherit'});
              console.log('');
            });
          "
