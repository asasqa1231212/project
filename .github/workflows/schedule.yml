name: maintenance

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  # First job: Get categories from main project repository
  get-categories:
    runs-on: ubuntu-latest
    outputs:
      batches: ${{ steps.split-batches.outputs.batches }}
    steps:
      # Checkout the MAIN project repository to get categories
      - name: Checkout main project
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.MAIN_REPO }}
          token: ${{ secrets.MY_PAT }}
          path: main-project
          sparse-checkout: |
            categories.json
          sparse-checkout-cone-mode: false

      - name: Read and split categories into batches
        id: split-batches
        run: |
          # Read categories from JSON file
          categories=$(cat main-project/categories.json | jq -r '.categories | join(" ")')
          echo "Categories: $categories"
          
          # Split into batches of 4 and output as JSON array
          cat << 'BATCH_SCRIPT' > /tmp/split_batches.js
          const categories = process.argv[1].split(' ').filter(c => c);
          const batchSize = 4;
          const batches = [];
          for (let i = 0; i < categories.length; i += batchSize) {
            batches.push(categories.slice(i, i + batchSize));
          }
          console.log(JSON.stringify(batches));
          BATCH_SCRIPT
          
          batches=$(node /tmp/split_batches.js "$categories")
          echo "batches=$batches" >> $GITHUB_OUTPUT
          echo "Found $(echo $batches | jq '. | length') batches"

  # Second job: Run price updates with batches (4 categories per job)
  run:
    needs: get-categories
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        batch: ${{ fromJson(needs.get-categories.outputs.batches) }}

    container:
      image: mcr.microsoft.com/playwright:v1.58.1-jammy

    steps:
      # Checkout the private repository for scraping
      - name: Checkout private repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO }}
          token: ${{ secrets.MY_PAT }}
          path: project

      # Also checkout main project to get categories.json
      - name: Checkout main project for categories
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.MAIN_REPO }}
          token: ${{ secrets.MY_PAT }}
          path: main-project
          sparse-checkout: |
            categories.json
          sparse-checkout-cone-mode: false

      # Copy categories to project so scrape script can use them
      - name: Copy categories to project
        run: cp main-project/categories.json project/

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: project/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: project
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: project
        run: pnpm exec prisma generate

      - name: Install Playwright browsers
        working-directory: project
        run: pnpm exec playwright install chromium --with-deps

      - name: Run price updates for batch
        working-directory: project
        env:
          ENABLE_SCRAPING: "true"
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production
        run: |
          # Get categories from matrix batch as JSON array
          BATCH='${{ matrix.batch }}'
          # Parse JSON and run each category sequentially
          for category in $(echo "$BATCH" | jq -r '.[]'); do
            echo "========================================"
            echo "Processing category: $category"
            echo "========================================"
            CATEGORY="$category" pnpm -s scrape:update-prices
            echo ""
          done

