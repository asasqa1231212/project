  run:
    needs: get-categories
    if: ${{ needs.get-categories.outputs.categories != '[]' }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        category: ${{ fromJson(needs.get-categories.outputs.categories) }}

    container:
      image: mcr.microsoft.com/playwright:v1.58.1-jammy

    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191
        options: >-
          --health-cmd "curl -s http://localhost:8191/health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.MAIN_REPO }}
          token: ${{ secrets.MY_PAT }}
          path: project

      - name: Install pnpm (container)
        run: |
          npm install -g pnpm
          pnpm -v

      - name: Install dependencies
        working-directory: project
        run: pnpm install --frozen-lockfile

      - name: Setup Prisma
        working-directory: project
        run: pnpm exec prisma generate

      - name: Run scraper
        working-directory: project
        env:
          ENABLE_SCRAPING: "true"
          CATEGORY: ${{ matrix.category }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production
          CF_BACKEND: flaresolverr
          CF_BYPASS_API_URL: http://flaresolverr:8191
        run: pnpm -s scrape:update-prices