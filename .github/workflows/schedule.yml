name: maintenance

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  # First job: Get categories from database
  get-categories:
    runs-on: ubuntu-latest
    outputs:
      categories: ${{ steps.get-categories.outputs.categories }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.MAIN_REPO }}
          token: ${{ secrets.MY_PAT }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm exec prisma generate

      - name: Get categories from database
        id: get-categories
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          categories=$(pnpm exec tsx scripts/get-categories-from-db.ts)
          echo "Categories: $categories"
          echo "categories=$categories" >> $GITHUB_OUTPUT

  # Second job: Run price updates with matrix
  run:
    needs: get-categories
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        category: ${{ fromJson(needs.get-categories.outputs.categories) }}

    container:
      image: mcr.microsoft.com/playwright:v1.58.1-jammy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.MAIN_REPO }}
          token: ${{ secrets.MY_PAT }}
          path: project

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: project/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: project
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: project
        run: pnpm exec prisma generate

      - name: Install Playwright browsers
        working-directory: project
        run: pnpm exec playwright install chromium --with-deps

      - name: Run price update
        working-directory: project
        env:
          ENABLE_SCRAPING: "true"
          CATEGORY: ${{ matrix.category }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production
        run: pnpm -s scrape:update-prices

  # Notify on workflow completion
  notify:
    needs: [get-categories, run]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification - Success
        if: needs.run.result == 'success'
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "content": null,
              "embeds": [{
                "title": "✅ Price Update Completed",
                "description": "All categories have been updated!",
                "color": 65280,
                "fields": [
                  {"name": "Categories", "value": "${{ needs.get-categories.outputs.categories }}", "inline": false}
                ],
                "footer": {"text": "Bot"},
                "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
              }]
            }' \
            ${{ secrets.WEBHOOK }}

      - name: Send Discord notification - Failure
        if: needs.run.result == 'failure'
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "content": null,
              "embeds": [{
                "title": "❌ Price Update Failed",
                "description": "One or more categories failed!",
                "color": 16711680,
                "fields": [
                  {"name": "Categories", "value": "${{ needs.get-categories.outputs.categories }}", "inline": false}
                ],
                "footer": {"text": "Bot"},
                "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
              }]
            }' \
            ${{ secrets.WEBHOOK }}
