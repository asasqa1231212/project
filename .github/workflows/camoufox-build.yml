name: Build Camoufox Offline Package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install camoufox playwright

      - name: Install Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Create bundle folder
        run: |
          mkdir -p bundle

      - name: Locate Python site-packages
        run: |
          python -c "import site; print(site.getsitepackages()[0])"

      - name: Copy Camoufox package
        run: |
          SITE=$(python -c "import site; print(site.getsitepackages()[0])")
          cp -r $SITE/camoufox bundle/

      - name: Copy Playwright browsers
        run: |
          mkdir -p bundle/playwright
          cp -r ~/.cache/ms-playwright bundle/playwright || true

      - name: Create archive
        run: |
          tar -czf camoufox.tar.gz bundle

      - name: Upload Release (IMPORTANT)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: camoufox-v1
          files: camoufox.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}